<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SurajFX 2.0</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --c1: #a855f7;
    --c2: #06b6d4;
    --c3: #f43f5e;
    --c4: #22c55e;
    --bg: #080810;
    --glass: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08);
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    min-height: 100vh;
    font-family: 'DM Sans', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    position: relative;
  }

  /* Animated background orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.18;
    pointer-events: none;
    animation: drift 12s ease-in-out infinite alternate;
  }
  .orb1 { width: 400px; height: 400px; background: var(--c1); top: -100px; left: -120px; animation-delay: 0s; }
  .orb2 { width: 350px; height: 350px; background: var(--c2); bottom: -80px; right: -100px; animation-delay: -4s; }
  .orb3 { width: 250px; height: 250px; background: var(--c3); top: 50%; left: 50%; transform: translate(-50%,-50%); animation-delay: -8s; }

  @keyframes drift {
    0%   { transform: translate(0,0) scale(1); }
    100% { transform: translate(30px, 40px) scale(1.08); }
  }

  /* Noise overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0; opacity: 0.4;
  }

  .card {
    position: relative; z-index: 1;
    width: min(420px, 92vw);
    padding: 40px 28px 44px;
    background: rgba(12,12,22,0.85);
    border: 1px solid var(--border);
    border-radius: 32px;
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    box-shadow: 0 0 0 1px rgba(255,255,255,0.04), 0 40px 80px rgba(0,0,0,0.7);
    animation: cardIn 0.9s cubic-bezier(.22,1,.36,1) both;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(40px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    gap: 18px;
    margin-bottom: 28px;
    animation: fadeUp 0.7s 0.15s both;
  }

  .avatar-wrap {
    position: relative;
    flex-shrink: 0;
  }
  .avatar-ring {
    position: absolute; inset: -3px;
    border-radius: 50%;
    background: conic-gradient(var(--c1), var(--c2), var(--c3), var(--c1));
    animation: spin 4s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .avatar-ring::after {
    content: '';
    position: absolute; inset: 3px;
    border-radius: 50%;
    background: var(--bg);
  }
  .avatar {
    position: relative; z-index: 1;
    width: 72px; height: 72px;
    border-radius: 50%;
    object-fit: cover;
    display: block;
  }

  .header-text { flex: 1; }
  .badge {
    font-size: 10px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .name {
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .name span {
    background: linear-gradient(90deg, var(--c1), var(--c2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .tagline {
    margin-top: 4px;
    font-size: 12.5px;
    color: rgba(255,255,255,0.4);
    font-weight: 300;
  }

  /* Divider */
  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
    margin: 0 0 28px;
    animation: fadeUp 0.7s 0.25s both;
  }

  /* Link buttons */
  .links { display: flex; flex-direction: column; gap: 14px; }

  .link-btn {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 17px 20px;
    border-radius: 18px;
    border: 1px solid transparent;
    text-decoration: none;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.22s cubic-bezier(.34,1.56,.64,1), box-shadow 0.22s;
    animation: fadeUp 0.6s both;
  }
  .link-btn:nth-child(1) { animation-delay: 0.3s; }
  .link-btn:nth-child(2) { animation-delay: 0.42s; }
  .link-btn:nth-child(3) { animation-delay: 0.54s; }
  .link-btn:nth-child(4) { animation-delay: 0.66s; }

  .link-btn:hover {
    transform: translateY(-3px) scale(1.015);
  }
  .link-btn:active {
    transform: translateY(0) scale(0.98);
  }

  /* Glow layer */
  .link-btn::before {
    content: '';
    position: absolute; inset: 0;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .link-btn:hover::before { opacity: 1; }

  /* Shimmer sweep */
  .link-btn::after {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 60%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
    transform: skewX(-20deg);
    transition: left 0.5s ease;
  }
  .link-btn:hover::after { left: 160%; }

  .btn-left { display: flex; align-items: center; gap: 14px; }
  .btn-icon-wrap {
    width: 40px; height: 40px;
    border-radius: 12px;
    background: rgba(0,0,0,0.25);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }


  .btn-text { display: flex; flex-direction: column; gap: 1px; }
  .btn-label {
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.01em;
  }
  .btn-sub {
    font-size: 11px;
    color: rgba(255,255,255,0.45);
    font-weight: 400;
  }

  .btn-arrow {
    font-size: 18px;
    color: rgba(255,255,255,0.5);
    transition: transform 0.2s, color 0.2s;
  }
  .link-btn:hover .btn-arrow { transform: translateX(4px); color: #fff; }

  /* Card 1 – Templates (purple) */
  .btn-templates {
    background: linear-gradient(135deg, rgba(168,85,247,0.18), rgba(124,58,237,0.08));
    border-color: rgba(168,85,247,0.25);
    box-shadow: 0 4px 24px rgba(168,85,247,0.1), inset 0 1px 0 rgba(255,255,255,0.06);
  }
  .btn-templates:hover {
    box-shadow: 0 8px 40px rgba(168,85,247,0.35), inset 0 1px 0 rgba(255,255,255,0.1);
    border-color: rgba(168,85,247,0.6);
  }
  .btn-templates::before { background: radial-gradient(ellipse at left, rgba(168,85,247,0.12), transparent 60%); }
  .btn-templates .btn-icon-wrap { background: rgba(168,85,247,0.2); }

  /* Card 2 – Prompts (cyan) */
  .btn-prompts {
    background: linear-gradient(135deg, rgba(6,182,212,0.18), rgba(14,116,144,0.08));
    border-color: rgba(6,182,212,0.25);
    box-shadow: 0 4px 24px rgba(6,182,212,0.1), inset 0 1px 0 rgba(255,255,255,0.06);
  }
  .btn-prompts:hover {
    box-shadow: 0 8px 40px rgba(6,182,212,0.35), inset 0 1px 0 rgba(255,255,255,0.1);
    border-color: rgba(6,182,212,0.6);
  }
  .btn-prompts::before { background: radial-gradient(ellipse at left, rgba(6,182,212,0.12), transparent 60%); }
  .btn-prompts .btn-icon-wrap { background: rgba(6,182,212,0.2); }

  /* Card 3 – Telegram (blue) */
  .btn-telegram {
    background: linear-gradient(135deg, rgba(37,99,235,0.18), rgba(29,78,216,0.08));
    border-color: rgba(59,130,246,0.25);
    box-shadow: 0 4px 24px rgba(59,130,246,0.1), inset 0 1px 0 rgba(255,255,255,0.06);
  }
  .btn-telegram:hover {
    box-shadow: 0 8px 40px rgba(59,130,246,0.35), inset 0 1px 0 rgba(255,255,255,0.1);
    border-color: rgba(59,130,246,0.6);
  }
  .btn-telegram::before { background: radial-gradient(ellipse at left, rgba(59,130,246,0.12), transparent 60%); }
  .btn-telegram .btn-icon-wrap { background: rgba(59,130,246,0.2); }

  /* Card 4 – WhatsApp (green) */
  .btn-whatsapp {
    background: linear-gradient(135deg, rgba(34,197,94,0.18), rgba(22,163,74,0.08));
    border-color: rgba(34,197,94,0.25);
    box-shadow: 0 4px 24px rgba(34,197,94,0.1), inset 0 1px 0 rgba(255,255,255,0.06);
  }
  .btn-whatsapp:hover {
    box-shadow: 0 8px 40px rgba(34,197,94,0.35), inset 0 1px 0 rgba(255,255,255,0.1);
    border-color: rgba(34,197,94,0.6);
  }
  .btn-whatsapp::before { background: radial-gradient(ellipse at left, rgba(34,197,94,0.12), transparent 60%); }
  .btn-whatsapp .btn-icon-wrap { background: rgba(34,197,94,0.2); }

  /* Footer */
  .footer {
    margin-top: 30px;
    text-align: center;
    font-size: 11px;
    color: rgba(255,255,255,0.18);
    letter-spacing: 0.06em;
    font-family: 'Syne', sans-serif;
    animation: fadeUp 0.6s 0.8s both;
  }
  .footer span {
    background: linear-gradient(90deg, var(--c1), var(--c2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(22px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Pulse dot */
  .live-dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #22c55e;
    margin-right: 6px;
    box-shadow: 0 0 0 0 rgba(34,197,94,0.6);
    animation: pulse-dot 2s ease-in-out infinite;
    vertical-align: middle;
  }
  @keyframes pulse-dot {
    0%   { box-shadow: 0 0 0 0 rgba(34,197,94,0.7); }
    70%  { box-shadow: 0 0 0 7px rgba(34,197,94,0); }
    100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }
  }
</style>
</head>
<body>
